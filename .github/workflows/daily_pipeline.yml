name: Daily Football Pipeline

on:
  schedule:
    - cron: '0 8 * * *' # Roda todo dia às 08:00 AM
  workflow_dispatch:     # Permite rodar manualmente pelo botão no site do GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests python-dotenv

      - name: Run Pipeline
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_BASE_URL: https://api.football-data.org/v4
        run: python -m src.main