name: Daily Football Pipeline

on:
  schedule:
    - cron: '0 8 * * *' # Roda todo dia às 08:00 AM
  workflow_dispatch:     # Permite rodar manualmente pelo botão no site do GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    # Adicionamos um timeout para evitar que o job fique travado infinitamente
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests python-dotenv pyarrow

      - name: Run Pipeline
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_BASE_URL: https://api.football-data.org/v4
        run: python -m src.main

      # Opcional: Se você quiser que o sistema tente rodar novamente em caso de falha,
      # o próprio GitHub Actions permite que você clique em "Re-run failed jobs".
      # A configuração acima é o padrão industrial para jobs de ETL.