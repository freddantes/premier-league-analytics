name: Daily Football Pipeline & Tests

on:
  schedule:
    - cron: '0 8 * * *' # Roda todo dia às 08:00 AM UTC
  workflow_dispatch:     # Permite acionamento manual no site do GitHub
  push:
    branches: [ main ]   # Roda testes automaticamente a cada push na branch principal
  pull_request:
    branches: [ main ]   # Roda testes em pull requests

jobs:
  run-pipeline-and-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: python -m pytest

      - name: Run Main ETL Pipeline
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_BASE_URL: https://api.football-data.org/v4
        run: python -m src.main